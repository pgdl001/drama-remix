name: Build Backend

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-backend:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        shell: pwsh
        run: |
          pip install pyinstaller edge-tts
          pip install -e backend/

      - name: Download FFmpeg
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip" -OutFile "ffmpeg.zip"
          Expand-Archive -Path "ffmpeg.zip" -DestinationPath "ffmpeg" -Force

      - name: Build backend with PyInstaller
        shell: pwsh
        run: |
          cd backend
          pyinstaller --noconfirm backend.spec

      - name: Prepare release folder
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "release" -Force
          Copy-Item "backend/dist/backend" "release/" -Recurse -Force
          Copy-Item "ffmpeg" "release/" -Recurse -Force

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-exe
          path: release/
          retention-days: 5
