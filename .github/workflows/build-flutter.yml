name: Build Flutter Windows

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build-flutter:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Clone Flutter SDK
        run: |
          git clone --depth 1 --branch stable https://github.com/flutter/flutter.git -q
          & "${{ github.workspace }}/flutter/bin/flutter" precache --windows

      - name: Enable Windows desktop
        run: "& \"${{ github.workspace }}/flutter/bin/flutter\" config --enable-windows-desktop"
        working-directory: drama_remix_app

      - name: Get Flutter dependencies
        run: "& \"${{ github.workspace }}/flutter/bin/flutter\" pub get"
        working-directory: drama_remix_app

      - name: Build Flutter Windows
        run: "& \"${{ github.workspace }}/flutter/bin/flutter\" build windows --release"
        working-directory: drama_remix_app

      - name: Upload Flutter Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: flutter-windows-exe
          path: drama_remix_app/build/windows/runner/Release/
          retention-days: 5
